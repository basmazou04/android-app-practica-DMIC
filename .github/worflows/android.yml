name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Mensaje antes del build
        run: echo "Iniciando build y tests"

      - name: Build del proyecto
        run: ./gradlew build

      - name: Ejecutar tests
        run: ./gradlew test

      - name: Mensaje final
        run: echo "Build y tests finalitzats"